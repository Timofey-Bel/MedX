<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест кастомных модальных окон</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="http://sfera/css/admin-desktop.css">
</head>
<body style="padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <h1>Тест кастомных модальных окон</h1>
    
    <button onclick="testLogoutModal()" style="margin: 10px; padding: 10px 20px;">Тест модального окна выхода</button>
    <button onclick="testDeleteModal()" style="margin: 10px; padding: 10px 20px;">Тест модального окна удаления</button>
    <button onclick="testArrangeModal()" style="margin: 10px; padding: 10px 20px;">Тест модального окна упорядочивания</button>
    
    <script>
        // Функции из _globals.blade.php
        function showCustomModal(options) {
            var modalHtml = `
                <div class="custom-modal-overlay" id="customModalOverlay">
                    <div class="custom-modal">
                        <div class="custom-modal-header">
                            <div class="custom-modal-icon ${options.icon || 'question'}">
                                <span class="material-icons">${getIconName(options.icon)}</span>
                            </div>
                            <h3 class="custom-modal-title">${options.title || 'Подтверждение'}</h3>
                        </div>
                        <div class="custom-modal-body">
                            <p class="custom-modal-message">${options.message || ''}</p>
                        </div>
                        <div class="custom-modal-actions">
                            ${generateButtons(options.buttons || [])}
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            var overlay = document.getElementById('customModalOverlay');
            
            setTimeout(function() {
                overlay.classList.add('show');
            }, 10);
            
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    closeCustomModal();
                }
            });
            
            document.addEventListener('keydown', handleModalKeydown);
            
            setTimeout(function() {
                var firstButton = overlay.querySelector('.custom-modal-button');
                if (firstButton) {
                    firstButton.focus();
                }
            }, 200);
            
            return overlay;
        }
        
        function closeCustomModal() {
            var overlay = document.getElementById('customModalOverlay');
            if (overlay) {
                overlay.classList.remove('show');
                document.removeEventListener('keydown', handleModalKeydown);
                
                setTimeout(function() {
                    if (overlay.parentNode) {
                        overlay.parentNode.removeChild(overlay);
                    }
                }, 200);
            }
        }
        
        function handleModalKeydown(e) {
            if (e.key === 'Escape') {
                closeCustomModal();
            }
        }
        
        function getIconName(iconType) {
            switch (iconType) {
                case 'question': return 'help_outline';
                case 'warning': return 'warning';
                case 'error': return 'error_outline';
                case 'info': return 'info_outline';
                default: return 'help_outline';
            }
        }
        
        function generateButtons(buttons) {
            return buttons.map(function(button) {
                return `<button class="custom-modal-button ${button.type || 'secondary'}" 
                                onclick="handleModalButtonClick('${button.action || ''}', this)">
                            ${button.text || 'OK'}
                        </button>`;
            }).join('');
        }
        
        function handleModalButtonClick(action, buttonElement) {
            if (window.currentModalCallback && typeof window.currentModalCallback === 'function') {
                window.currentModalCallback(action);
            }
            
            closeCustomModal();
        }
        
        // Тестовые функции
        function testLogoutModal() {
            window.currentModalCallback = function(action) {
                if (action === 'logout') {
                    alert('Выход выполнен!');
                } else {
                    alert('Выход отменен');
                }
            };
            
            showCustomModal({
                title: 'Выход из системы',
                message: 'Вы действительно хотите завершить сеанс работы?',
                icon: 'question',
                buttons: [
                    {
                        text: 'Отмена',
                        type: 'secondary',
                        action: 'cancel'
                    },
                    {
                        text: 'Выйти',
                        type: 'primary',
                        action: 'logout'
                    }
                ]
            });
        }
        
        function testDeleteModal() {
            window.currentModalCallback = function(action) {
                if (action === 'delete') {
                    alert('Ярлык удален!');
                } else {
                    alert('Удаление отменено');
                }
            };
            
            showCustomModal({
                title: 'Удаление ярлыка',
                message: 'Вы уверены, что хотите удалить ярлык "Тестовое приложение"?',
                icon: 'warning',
                buttons: [
                    {
                        text: 'Отмена',
                        type: 'secondary',
                        action: 'cancel'
                    },
                    {
                        text: 'Удалить',
                        type: 'primary',
                        action: 'delete'
                    }
                ]
            });
        }
        
        function testArrangeModal() {
            window.currentModalCallback = function(action) {
                if (action === 'arrange') {
                    alert('Ярлыки упорядочены!');
                } else {
                    alert('Упорядочивание отменено');
                }
            };
            
            showCustomModal({
                title: 'Упорядочить значки',
                message: 'Расположить все ярлыки по сетке? Текущие позиции будут сброшены.',
                icon: 'question',
                buttons: [
                    {
                        text: 'Отмена',
                        type: 'secondary',
                        action: 'cancel'
                    },
                    {
                        text: 'Упорядочить',
                        type: 'primary',
                        action: 'arrange'
                    }
                ]
            });
        }
    </script>
</body>
</html>
